  // ---- Charts ----
  function drawBarChart() {
    const c = document.getElementById('barChart'); if (!c) return;
    const dpr = window.devicePixelRatio || 1, w = c.clientWidth, h = 220;
    c.width = w*dpr; c.height = h*dpr; const ctx = c.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,w,h);
    const data=[42,55,48,63,58,71,66], labels=['Jan','Fev','Mar','Abr','Mai','Jun','Jul'];
    const max=80, pad=28, gap=(w-pad*2)/data.length, bw=gap*0.55;
    ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1;
    for(let g=0;g<=4;g++){const y=pad+(h-pad*2)*g/4;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-pad,y);ctx.stroke();}
    data.forEach((v,i)=>{const x=pad+gap*i+(gap-bw)/2,bh=(v/max)*(h-pad*2),y=h-pad-bh;
      const grad=ctx.createLinearGradient(0,y,0,h-pad);grad.addColorStop(0,'#00F2FE');grad.addColorStop(1,'#028090');
      ctx.fillStyle=grad;ctx.beginPath();ctx.roundRect(x,y,bw,bh,6);ctx.fill();
      ctx.fillStyle='#9ca3af';ctx.font='11px Work Sans';ctx.textAlign='center';ctx.fillText(labels[i],x+bw/2,h-pad+16);});
  }
  function drawPieChart() {
    const c=document.getElementById('pieChart'); if(!c) return;
    const dpr=window.devicePixelRatio||1,w=c.clientWidth,h=220;
    c.width=w*dpr;c.height=h*dpr;const ctx=c.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,w,h);
    const segs=[{label:'Tilápia',val:40,color:'#028090'},{label:'Camarão',val:25,color:'#00F2FE'},{label:'Pescada',val:20,color:'#0F3A40'},{label:'Outros',val:15,color:'#1F2D3D'}];
    const cx=w/2,cy=h/2,r=Math.min(w,h)/2-12;let start=-Math.PI/2,total=segs.reduce((s,x)=>s+x.val,0);
    segs.forEach(s=>{const ang=(s.val/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+ang);ctx.closePath();ctx.fillStyle=s.color;ctx.fill();start+=ang;});
    ctx.beginPath();ctx.arc(cx,cy,r*0.55,0,Math.PI*2);ctx.fillStyle='#09192E';ctx.fill();
    const legend=document.getElementById('pie-legend');legend.innerHTML='';
    segs.forEach(s=>{const row=document.createElement('div');row.className='flex items-center gap-2 text-gray-300';
      row.innerHTML=`<span style="width:12px;height:12px;border-radius:3px;background:${s.color};display:inline-block"></span>${s.label}<span class="ml-auto text-gray-400">${s.val}%</span>`;legend.appendChild(row);});
  }
  function drawCharts(){ drawBarChart(); drawPieChart(); }

  document.getElementById('config-form').addEventListener('submit', e=>{
    e.preventDefault();
    const m=document.getElementById('cfg-saved'); m.classList.remove('hidden');
    setTimeout(()=>m.classList.add('hidden'), 2400);
  });

  // ---- Data SDK sync and Data Handler ----
  let records = [];

  const dataHandler = {
    onDataChanged(newData) {
      records = newData;
      // We synchronize any user-entered items into our local visual views
      newData.forEach(record => {
        if (record.tipo === 'cliente') {
          try {
            const parsed = JSON.parse(record.conteudo);
            if (!cliRows.some(c => c.nome === parsed.nome)) {
              cliRows.push(parsed);
            }
          } catch(e){}
        } else if (record.tipo === 'funcionario') {
          try {
            const parsed = JSON.parse(record.conteudo);
            if (!funcRows.some(f => f.nome === parsed.nome)) {
              funcRows.push(parsed);
            }
          } catch(e){}
        } else if (record.tipo === 'lote') {
          try {
            const parsed = JSON.parse(record.conteudo);
            if (!estRows.some(e => e.lote === parsed.lote)) {
              estRows.push(parsed);
            }
          } catch(e){}
        } else if (record.tipo === 'producao') {
          try {
            const parsed = JSON.parse(record.conteudo);
            if (!prodRows.some(p => p.func === parsed.func && p.qtd === parsed.qtd)) {
              prodRows.push(parsed);
            }
          } catch(e){}
        }
      });
      renderAll();
    }
  };

  async function saveRecord(tipo, dataObj) {
    if (records.length >= 999) {
      showToast('Limite de 999 registros atingido no plano.');
      return;
    }
    const createResult = await window.dataSdk.create({
      tipo: tipo,
      conteudo: JSON.stringify(dataObj),
      extra: '',
      data_reg: new Date().toISOString()
    });
    if (createResult.isOk) {
      showToast('Registro sincronizado com a Planilha Canva!');
    } else {
      showToast('Erro ao sincronizar dados.');
    }
  }

  // ---- Login flow ----
  document.getElementById('login-form').addEventListener('submit', e=>{
    e.preventDefault();
    const val=document.getElementById('login-name').value.trim();
    const err=document.getElementById('login-error');
    if(!val){ err.classList.remove('hidden'); return; }
    err.classList.add('hidden');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderAll();
    requestAnimationFrame(drawCharts);
    lucide.createIcons();
  });
  document.getElementById('forgot-btn').addEventListener('click', ()=>{
    document.getElementById('forgot-msg').classList.remove('hidden');
  });
  document.getElementById('logout-btn').addEventListener('click', ()=>{
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
  });

  window.addEventListener('resize', ()=>{ if(!document.getElementById('app').classList.contains('hidden')) drawCharts(); });
  // seed one lote gramatura row for the modal
  addLoteRow();
  lucide.createIcons();

  // Initialize Data SDK for persistent storage
  (async () => {
    if (window.dataSdk) {
      await window.dataSdk.init(dataHandler);
    }
  })();
</script>
